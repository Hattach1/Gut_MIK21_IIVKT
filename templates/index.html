<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Game Recommender</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <h1>Steam Game Recommender</h1>

        <section class="block">
            <h2>Поиск игр</h2>
            <div class="row">
                <input type="text" id="searchInput" placeholder="Введите название игры">
                <button id="searchButton">Найти</button>
            </div>
            <div id="searchResults" class="card-list"></div>
        </section>

        <section class="block">
            <h2>Любимые игры</h2>
            <div id="likedGames" class="selected-list"></div>
            <button id="recommendButton">Получить рекомендации</button>
        </section>

        <section class="block">
            <h2>Рекомендации</h2>
            <div id="recommendations" class="card-list"></div>
        </section>

        <section class="block">
            <h2>Похожие игры</h2>
            <div id="similarGames" class="card-list"></div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
